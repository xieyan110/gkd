name: Build-Apk

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Build type (debug or release)'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - debug
      rename:
        description: 'Rename APK'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

  push:
    tags:
      - 'v*'
    paths-ignore:
      - 'LICENSE'
      - '*.md'
      - '.github/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

      - name: Write GKD secrets info
        run: |
          echo ${{ secrets.GKD_STORE_FILE_BASE64 }} | base64 --decode > ${{ github.workspace }}/gkd.jks
          echo GKD_STORE_FILE='${{ github.workspace }}/gkd.jks' >> gradle.properties
          echo GKD_STORE_PASSWORD='${{ secrets.GKD_STORE_PASSWORD }}' >> gradle.properties
          echo GKD_KEY_ALIAS='${{ secrets.GKD_KEY_ALIAS }}' >> gradle.properties
          echo GKD_KEY_PASSWORD='${{ secrets.GKD_KEY_PASSWORD }}' >> gradle.properties

      - name: Set build type
        run: |
          BUILD_TYPE="${{ github.event.inputs.type || 'release' }}"
          echo "BUILD_TYPE=$BUILD_TYPE" >> $GITHUB_ENV

      - name: Set rename flag
        run: |
          RENAME="${{ github.event.inputs.rename || 'true' }}"
          echo "GKD_RENAME_APK_FLAG=$RENAME" >> gradle.properties

      - name: Make gradlew executable
        run: chmod 777 ./gradlew

      - name: Build APK
        run: |
          if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew app:assembleGkdRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: gkd-apk
          path: |
            app/build/outputs/apk/gkd/release/*.apk
            app/build/outputs/apk/debug/*.apk

      - name: Upload outputs
        uses: actions/upload-artifact@v7
        with:
          name: outputs
          path: app/build/outputs
